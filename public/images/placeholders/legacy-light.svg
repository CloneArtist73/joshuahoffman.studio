<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Legacy placeholder</title>
  <desc id="desc">Gentle vertical placeholder artwork for legacy and memorial photography.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#121114" />
      <stop offset="45%" stop-color="#4f463f" />
      <stop offset="100%" stop-color="#b69b7b" />
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="28%" r="44%">
      <stop offset="0%" stop-color="#f2dfc5" stop-opacity=".58" />
      <stop offset="100%" stop-color="#f2dfc5" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)" />
  <rect width="1200" height="1600" fill="url(#glow)" />
  <rect x="210" y="410" width="780" height="640" rx="40" fill="#131218" opacity=".84" />
  <circle cx="418" cy="646" r="112" fill="#f7f2e8" opacity=".14" />
  <circle cx="708" cy="646" r="112" fill="#f7f2e8" opacity=".14" />
