<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Portrait session placeholder</title>
  <desc id="desc">Vertical placeholder artwork for portrait photographs.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#14151b" />
      <stop offset="55%" stop-color="#2a3241" />
      <stop offset="100%" stop-color="#7f7566" />
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#f7f2e8" stop-opacity=".35" />
      <stop offset="100%" stop-color="#f7f2e8" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)" />
  <rect width="1200" height="1600" fill="url(#light)" />
  <ellipse cx="610" cy="650" rx="218" ry="290" fill="#121217" opacity=".85" />
  <rect x="392" y="930" width="438" height="368" rx="170" fill="#16161c" opacity=".84" />
  <text x="110" y="1430" fill="#f7f2e8" font-family="Georgia, serif" font-size="56">
    Portrait placeholder
  </text>
  <text x="110" y="1490" fill="#ddd4c2" font-family="Arial, sans-serif" font-size="24" letter-spacing="4">
    swap with real vertical portrait
  </text>
</svg>
